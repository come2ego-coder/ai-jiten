<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI生活辞典</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32-v2.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon-v2.png">
<meta name="theme-color" content="#F7F1E4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI生活辞典">
<style>
  :root{
    --paper:#F7F1E4;
    --paper-deep:#EFE6D2;
    --ink:#2E2A24;
    --ink-soft:#6B6255;
    --line:#D8CBB0;
    --money:#7C8C58;
    --health:#B5695F;
    --home:#C89B4A;
    --ai:#4C6B8A;
    --rel:#8C6E8C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    position:relative;
    padding-bottom:40px;
  }
  /* ---- header ---- */
  .topbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:18px 18px 10px;
    position:sticky;
    top:0;
    background:var(--paper);
    z-index:10;
    border-bottom:1px solid var(--line);
  }
  .backbtn{
    border:none;
    background:none;
    font-size:22px;
    color:var(--ink-soft);
    cursor:pointer;
    padding:4px 8px 4px 0;
    line-height:1;
    visibility:hidden;
  }
  .backbtn.show{visibility:visible;}
  .topbar-title{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:17px;
    font-weight:600;
    letter-spacing:.02em;
  }
  .topbar-profile{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:5px;
    font-size:11.5px;
    color:var(--ink-soft);
    border:1px solid var(--line);
    border-radius:20px;
    padding:5px 12px 5px 9px;
    white-space:nowrap;
    background:#fff;
    cursor:pointer;
  }

  /* ---- HOME ---- */
  .home-hero{
    padding:28px 24px 8px;
    text-align:center;
  }
  .home-hero .icon{font-size:40px;}
  .home-hero h1{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:26px;
    margin:8px 0 6px;
    letter-spacing:.04em;
  }
  .home-hero p{
    color:var(--ink-soft);
    font-size:13.5px;
    line-height:1.7;
    margin:0 auto;
    max-width:320px;
  }
  .profile-banner{
    margin:18px 18px 0;
    background:#fff;
    border:1px dashed var(--line);
    border-radius:8px;
    padding:13px 14px;
    font-size:12.5px;
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
  }
  .profile-banner b{color:var(--ink); font-weight:600;}
  .profile-banner .go{margin-left:auto; font-size:15px;}
  .tabs{
    padding:20px 18px 10px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .tab-card{
    display:flex;
    align-items:center;
    gap:14px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:16px 16px 16px 0;
    cursor:pointer;
    text-align:left;
    position:relative;
    overflow:hidden;
    transition:transform .12s ease;
  }
  .tab-card:active{transform:scale(0.98);}
  .tab-flag{
    width:14px;
    align-self:stretch;
    border-radius:6px 0 0 6px;
  }
  .tab-emoji{font-size:24px;}
  .tab-body{flex:1;}
  .tab-title{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:16.5px;
    font-weight:600;
  }
  .tab-count{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .tab-arrow{
    font-size:16px;
    color:var(--ink-soft);
    padding-right:14px;
  }
  .home-footnote{
    text-align:center;
    font-size:11.5px;
    color:var(--ink-soft);
    padding:18px 30px 4px;
    line-height:1.7;
  }

  /* ---- LIST ---- */
  .list-hero{
    padding:16px 20px 6px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .list-hero .emoji{font-size:26px;}
  .list-hero h2{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:19px;
    margin:0;
  }
  .list-hint{
    margin:0 20px 14px;
    font-size:11.5px;
    color:var(--ink-soft);
    padding:8px 12px;
    background:var(--paper-deep);
    border-radius:6px;
    line-height:1.6;
  }
  .item-list{
    padding:0 18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .item-row{
    display:flex;
    align-items:center;
    gap:12px;
    background:#fff;
    border:1px dashed var(--line);
    border-radius:6px;
    padding:14px 14px;
    cursor:pointer;
  }
  .item-num{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:14px;
    color:var(--ink-soft);
    min-width:20px;
  }
  .item-label{
    flex:1;
    font-size:14.5px;
  }
  .item-go{color:var(--ink-soft);font-size:14px;}

  /* ---- DETAIL (pattern card) ---- */
  .detail-wrap{padding:14px 20px 10px;}
  .pattern-card{
    background:#fffdf8;
    border:2px dashed var(--card-color, var(--ink-soft));
    border-radius:10px;
    padding:22px 18px 20px;
    position:relative;
  }
  .pattern-card::before{
    content:"✂ きりとり線";
    position:absolute;
    top:-11px;
    left:16px;
    background:var(--paper);
    padding:0 8px;
    font-size:10.5px;
    color:var(--ink-soft);
    letter-spacing:.05em;
  }
  .pattern-tag{
    display:inline-block;
    font-size:11px;
    color:#fff;
    background:var(--card-color, var(--ink-soft));
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:10px;
  }
  .level-switch{
    display:flex;
    gap:6px;
    margin-bottom:12px;
  }
  .level-btn{
    border:1px solid var(--line);
    background:#fff;
    color:var(--ink-soft);
    font-size:12px;
    font-weight:600;
    padding:6px 14px;
    border-radius:20px;
    cursor:pointer;
  }
  .level-btn.active{
    background:var(--card-color, var(--ink));
    color:#fff;
    border-color:transparent;
  }
  .pattern-title{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:17px;
    margin:0 0 14px;
    line-height:1.5;
  }
  .pattern-body{
    font-size:14.5px;
    line-height:1.9;
    white-space:pre-wrap;
    color:var(--ink);
    background:var(--paper-deep);
    border-radius:8px;
    padding:14px;
  }
  .pattern-body .profile-part{
    color:var(--card-color, var(--ink-soft));
    font-weight:600;
  }
  .pattern-note{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:10px;
    line-height:1.7;
  }
  .profile-missing{
    margin-top:12px;
    font-size:12px;
    color:var(--card-color, var(--ink-soft));
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
  }
  .profile-missing .go{margin-left:auto;}
  .copy-btn{
    width:100%;
    margin-top:16px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:var(--card-color, var(--ink));
    color:#fff;
    font-size:15px;
    font-weight:600;
    letter-spacing:.03em;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .copy-btn:active{opacity:.85;}
  .toast{
    position:fixed;
    left:50%;
    bottom:36px;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    font-size:13.5px;
    padding:10px 20px;
    border-radius:30px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:50;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .prev-next{
    display:flex;
    justify-content:space-between;
    gap:10px;
    padding:16px 20px 0;
  }
  .nav-btn{
    flex:1;
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    padding:11px;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    text-align:center;
  }
  .nav-btn:disabled{opacity:.35;}

  /* ---- PROFILE SCREEN ---- */
  .profile-wrap{padding:16px 20px 10px;}
  .profile-intro{
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.8;
    margin-bottom:18px;
  }
  .field{margin-bottom:16px;}
  .field label{
    display:block;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  .field input, .field textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius:8px;
    padding:11px 12px;
    font-size:14.5px;
    font-family:inherit;
    background:#fff;
    color:var(--ink);
    resize:none;
  }
  .field textarea{min-height:70px; line-height:1.6;}
  .save-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:var(--ink);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:6px;
  }
  .save-btn:active{opacity:.85;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast">コピーしました</div>

<script>
const DATA = [
  {
    id:"money", emoji:"💴", label:"お金", color:"var(--money)",
    items:[
      {t:"年金の見込み額を整理する", p:"将来もらえる年金について、以下をふまえて整理してください。\n・現在の年齢：○○歳\n・ねんきん定期便に書かれている年金見込み額：○○円\n・退職予定年齢：○○歳\n年金だけで生活できるかの考え方と、今からできる対策を、専門用語を使わず教えてください。", pa:"公的年金の受給見込みについて、詳細なシミュレーションをお願いします。\n・現在の年齢：○○歳\n・ねんきん定期便の年金見込み額(65歳時点)：○○円\n・厚生年金・国民年金の別、加入期間：○○\n・繰上げ/繰下げ受給の検討有無：○○\n・退職予定年齢と、その後の就労予定(継続雇用など)：○○\n繰下げ受給した場合の増額率、在職老齢年金による支給停止の可能性、手取りベースでの実質額(税・社会保険料控除後)を含めて、複数パターンを比較して整理してください。"},
      {t:"家計を見直す", p:"以下の支出項目をもとに、無理なく減らせる部分を提案してください。\n・家賃/住宅ローン：○○円\n・食費：○○円\n・光熱費：○○円\n・通信費：○○円\n・その他：○○円\n「我慢する節約」ではなく、「仕組みで自然に減る節約」を優先して教えてください。", pa:"家計の支出構造を、固定費・変動費・特別費に分解し、ゼロベース予算(Zero-Based Budgeting)の考え方で見直したいです。\n・年間の主な支出項目と金額：○○\n・世帯の手取り年収：○○円\n・貯蓄率の目標：○○%\n各支出項目について、削減余地を「弾力性(削っても生活の質に影響しにくいか)」の観点で評価し、優先順位付きの改善プランと、目標貯蓄率達成までのシミュレーションを提示してください。"},
      {t:"老後資金がいくら必要か整理する", p:"老後に必要な資金がいくらくらいか、以下をふまえてざっくり計算してください。\n・現在の年齢：○○歳\n・退職予定年齢：○○歳\n・現在の貯蓄額：○○円\n・年金以外の収入見込み：○○円\n不安を煽らず、現実的な目安と今からできる対策を教えてください。", pa:"老後資金について、取り崩しシミュレーション(定率取り崩し・定額取り崩しの比較)をお願いします。\n・現在の年齢、退職予定年齢：○○\n・金融資産の内訳(現金・投資信託・株式など)：○○\n・年金以外の収入(不動産収入等)：○○\n・想定する運用利回りとインフレ率：○○\n4%ルールや、日本の税制・社会保険料負担を踏まえた実質的な取り崩し可能額を試算し、資産寿命(何歳まで資産が持つか)を複数シナリオ(保守的/標準/楽観的)で示してください。"},
      {t:"ふるさと納税を分かりやすく整理する", p:"ふるさと納税をやってみたいですが、仕組みがよく分かりません。以下を初心者向けに説明してください。\n・私の年収：約○○円\n・上限額の目安\n・手続きの流れ(ワンストップ特例含む)\n・注意点\n難しい言葉を使わず、「結局いくら得するのか」を中心に教えてください。", pa:"ふるさと納税の控除上限額を、正確な計算方法にもとづいて算出してください。\n・給与収入(額面)：○○円\n・扶養家族の人数・控除区分：○○\n・住宅ローン控除やiDeCoなど他の所得控除の有無：○○\n住民税所得割額の2割を基準とした上限額の計算式を示し、他の控除との兼ね合いで上限額がどう変動するか、ワンストップ特例と確定申告の選択による違いも含めて解説してください。"},
      {t:"確定申告が必要か整理する", p:"確定申告が必要かどうか整理したいです。以下をふまえて教えてください。\n・パート収入：約○○円\n・副業収入：約○○円\n・経費として使ったもの：○○\n確定申告が必要かどうかの判断と、必要な場合の準備の流れを、初心者向けに教えてください。", pa:"確定申告の要否と、青色申告と白色申告どちらが有利か判断したいです。\n・給与収入：○○円\n・副業の所得区分(事業所得/雑所得の見込み)：○○\n・副業の売上・経費の概算：○○\n・インボイス制度への登録有無：○○\n青色申告特別控除(65万円/55万円/10万円)の適用要件、必要な帳簿の種類、消費税の課税事業者判定(2年前の売上・インボイス登録の影響)を踏まえて、最適な申告方法と準備事項を整理してください。"},
      {t:"保険を見直す", p:"今入っている保険が自分に合っているか見直したいです。以下をふまえて教えてください。\n・加入している保険の種類：○○\n・月々の保険料：約○○円\n・気になっていること：○○\n見直すときのチェックポイントを、専門用語を使わず教えてください。", pa:"生命保険・医療保険について、必要保障額の計算にもとづいた見直しをしたいです。\n・現在加入している保険の種類・保障内容・保険料：○○\n・家族構成、住宅ローンの有無(団信加入状況)：○○\n・公的保障(高額療養費制度、遺族年金)の把握状況：○○\n必要保障額(遺族生活費の総額から公的保障・金融資産を差し引いた額)を計算し、保険料の払込総額と保障内容のコストパフォーマンスを評価した上で、過不足を整理してください。"},
      {t:"クレジットカードの使い方を整理する", p:"クレジットカードの使い方を見直したいです。以下をふまえて教えてください。\n・持っているカード：○○枚\n・主な使い道：○○\n・困っていること：○○\nポイントを賢く貯める使い方と、使いすぎを防ぐコツを教えてください。", pa:"複数のクレジットカードを、還元率とポイントの実質価値の観点で最適化したいです。\n・保有カードと、それぞれの基本還元率・特約：○○\n・主な支出カテゴリと月間利用額の内訳：○○\n・貯めているポイント/マイルの種類：○○\nカテゴリ別に還元率が最大化されるカードの使い分けと、ポイントを現金換算した際の実質利回りを試算し、年間の最適化余地(円換算)を示してください。"},
      {t:"固定費を見直す", p:"毎月の固定費を見直したいです。以下の項目をもとに、削減できそうな部分を提案してください。\n・通信費：○○円\n・サブスク：○○\n・その他固定費：○○円\n無理のない範囲で、削減の優先順位をつけて教えてください。", pa:"固定費について、投資対効果(削減額 ÷ 見直しにかかる手間)の観点で優先順位をつけたいです。\n・固定費の項目と金額の一覧：○○\n・それぞれの契約期間・解約条件(違約金など)：○○\n削減インパクトが大きく、かつ手続きの手間が少ない順に並べたアクションプランと、実行した場合の年間削減額の試算を提示してください。"},
      {t:"医療費控除を整理する", p:"医療費控除が使えるか整理したいです。以下をふまえて教えてください。\n・1年間の医療費の合計：約○○円\n・家族の医療費も含むか：○○\n対象になるかどうかの考え方と、必要な準備を、初心者向けに教えてください。", pa:"医療費控除とセルフメディケーション税制、どちらを選ぶべきか判断したいです。\n・年間医療費の合計と内訳(通院費、市販薬購入額など)：○○\n・世帯の所得税率(概算)：○○\n・生命保険の入院給付金等、補填された金額：○○\n両制度の控除額を実際に計算して比較し、還付される所得税額・翌年の住民税減少額まで含めた実質的なメリットを試算してください。"},
      {t:"教育費・親の介護費を整理する", p:"以下について、今のうちに考えておきたいです。\n・子どもの教育費で気になっていること：○○\n・親の介護で気になっていること：○○\n一般的な費用の目安と、今から準備しておくべきことを、専門用語を使わず教えてください。", pa:"今後10〜15年程度の教育費・介護費を含めたキャッシュフロー表を作成したいです。\n・子どもの年齢と進学予定(公立/私立の想定)：○○\n・親の年齢・要介護度の見込み：○○\n・現在の年収、貯蓄額、資産運用の状況：○○\n教育費のピーク時期と介護費が重なる可能性を踏まえ、年次のキャッシュフロー(収入-支出-貯蓄)を試算し、資金不足が生じる時期があれば警告してください。"},
      {t:"パート収入と扶養の関係を整理する", p:"パート収入が扶養にどう影響するか整理したいです。以下をふまえて教えてください。\n・現在の年収の目安：約○○円\n・配偶者の扶養に入っているか：○○\n年収の壁の考え方と、私の場合どう働くのがいいか、専門用語を使わず教えてください。", pa:"パート収入について、106万・103万・130万・150万円の壁を踏まえた最適な働き方を試算したいです。\n・現在の時給、月間労働時間：○○\n・勤務先の従業員数(社会保険の適用拡大対象か)：○○\n・配偶者の年収、勤務先の家族手当の有無：○○\n各壁を超えた場合の手取り額の変化(社会保険料負担、配偶者控除・配偶者特別控除の逓減、家族手当の有無)を具体的な金額で比較し、世帯の手取りが最大化する働き方を提案してください。"},
      {t:"つみたてNISAを整理する", p:"つみたてNISAを始めるか検討したいです。以下をふまえて教えてください。\n・毎月投資に回せそうな金額：約○○円\n・投資の経験：○○\n50代から始めるメリットと注意点を、専門用語を使わず教えてください。", pa:"新NISA(つみたて投資枠・成長投資枠)を活用した資産形成プランを設計したいです。\n・毎月の投資可能額：○○円\n・投資経験、リスク許容度：○○\n・iDeCoなど他の非課税制度の利用状況：○○\nアセットアロケーション(株式/債券比率など)の考え方、想定利回り別の将来資産額シミュレーション、iDeCoとの使い分け(流動性・所得控除の違い)を含めて提案してください。"},
      {t:"退職金の使い道を整理する", p:"退職金の使い道を考えたいです。以下をふまえて教えてください。\n・退職金の見込み額：約○○円\n・考えている使い道：○○\n使い道の優先順位と、避けたほうがいい使い方を、専門用語を使わず教えてください。", pa:"退職金の受け取り方(一時金・年金・併用)による税負担の違いを試算したいです。\n・退職金の見込み額：○○円\n・勤続年数：○○年\n・企業年金の有無、受け取り方の選択肢：○○\n退職所得控除額の計算、一時金として受け取った場合の課税退職所得金額と税額、年金として受け取った場合の雑所得としての課税(公的年金等控除との合算含む)を比較し、最も手取りが多くなる組み合わせを提案してください。"},
      {t:"電気代・ガス代を節約する", p:"電気代・ガス代を節約したいです。以下をふまえて教えてください。\n・月々の電気代：約○○円\n・月々のガス代：約○○円\n・家族構成：○○\n今日からできる節約方法を、無理なく続けられる形で教えてください。", pa:"電気・ガスの使用量データをもとに、家電単位でのコスト分析と契約プランの見直しをしたいです。\n・直近数ヶ月の使用量・金額(検針票の数値)：○○\n・主な家電の種類・使用時間の目安：○○\n・現在契約している電力・ガス会社とプラン：○○\n電力量料金単価と燃料費調整額の内訳を踏まえた実質単価を算出し、他社プランとの比較、消費電力の大きい家電の使用時間見直しによる削減効果を試算してください。"},
      {t:"お金の使い方の優先順位を整理する", p:"限られた収入の中で、お金の使い方の優先順位を整理したいです。\n・月の収入：約○○円\n・今かけている主な支出：○○\n・優先したいこと：○○\n何を優先し、何を削るべきか、一緒に整理してください。", pa:"限られた収入の配分について、複数の目的(貯蓄・投資・消費・自己投資)を重み付けした意思決定マトリクスを作りたいです。\n・月の手取り収入：○○円\n・現在の支出内訳：○○\n・重視したい価値観・優先事項(複数可)：○○\n各支出・貯蓄項目を「重要度」「緊急度」「将来リターン」の軸で評価し、点数化した上で最適な配分案を複数パターン提示してください。"},
      {t:"副業の税金を整理する", p:"副業の収入にかかる税金を整理したいです。以下をふまえて教えてください。\n・副業収入：約○○円\n・副業の内容：○○\n・経費として使ったもの：○○\n何を、いつまでに準備すればいいか、専門用語を使わず教えてください。", pa:"副業収入の税務処理について、事業所得と雑所得のどちらで申告すべきか、インボイス制度も踏まえて整理したいです。\n・副業の内容、年間売上・経費の概算：○○\n・帳簿の記帳状況、開業届の提出有無：○○\n・取引先が課税事業者か、インボイス登録を求められているか：○○\n事業所得として認められる要件(継続性・反復性など)、青色申告特別控除の適用可否、インボイス登録した場合の消費税負担とのバランスを踏まえて、最適な申告方針を提案してください。"},
      {t:"お金の不安を書き出して整理する", p:"お金のことで漠然とした不安があります。\n・今感じていること：○○(自由に書いてください)\n気持ちを整理して、今できる小さな一歩を一緒に考えてください。", pa:"お金に関する漠然とした不安を、具体的なリスク項目に分解して整理したいです。\n・感じている不安の内容：○○(自由に書いてください)\n・現在の資産・負債の概況：○○\n不安の要因を「収入減少リスク」「支出増加リスク」「資産運用リスク」「制度変更リスク」などに分類し、それぞれの発生可能性と影響度を評価した上で、優先して備えるべきリスクと具体的な対策を提案してください。"},
      {t:"携帯・通信費のプランを見直す", p:"携帯電話や通信費のプランを見直したいです。以下をふまえて教えてください。\n・現在の月額：約○○円\n・使っているキャリア：○○\n・データ使用量の目安：○○\n見直すときのチェックポイントを教えてください。", pa:"通信費について、直近のデータ使用量履歴をもとに、キャリア・MVNO各社のプランをGB単価で比較したいです。\n・直近3ヶ月のデータ使用量：○○\n・現在の契約内容と月額料金：○○\n・家族割引やセット割の利用状況：○○\n各社のプランをGB単価・実質負担額(セット割考慮後)で比較し、通信品質とのトレードオフも踏まえた最適なプランを提案してください。"},
      {t:"お小遣い制・家計の分け方を整理する", p:"家計とお小遣いの分け方を整理したいです。以下をふまえて教えてください。\n・世帯の月収：約○○円\n・現在の分け方(あれば)：○○\n無理なく続けられる分け方の考え方を教えてください。", pa:"世帯の家計管理について、ゼロサム予算(全ての収入に使い道を割り当てる方式)での設計をしたいです。\n・世帯の手取り月収：○○円\n・現在の分担方法(共有口座、個人口座の使い分けなど)：○○\n・夫婦(またはパートナー)間で意見が分かれている点：○○\n固定費・変動費・貯蓄・お小遣いへの配分ルールを設計し、双方が納得しやすい透明性の高い管理方法(見える化の方法含む)を提案してください。"},
      {t:"老後の住まいにかかるお金を整理する", p:"老後の住まいにかかるお金について整理したいです。以下をふまえて教えてください。\n・現在の住まい：持ち家/賃貸(○○)\n・今後の希望：○○\n考えるべき費用の項目と、今から準備しておきたいことを教えてください。", pa:"老後の住まいについて、「持ち家に住み続ける」「住み替え(ダウンサイジング)」「高齢者向け住宅への入居」の3パターンで、生涯コストを比較したいです。\n・現在の住まいの状況(築年数、住宅ローン残債など)：○○\n・想定する老後の年数、健康状態の見通し：○○\n・住み替え・入居を検討する場合の希望条件：○○\n各パターンについて、修繕費・管理費・入居一時金・月額費用などを含めた生涯コストを試算し、資産の取り崩しペースへの影響も踏まえて比較してください。"}
    ]
  },
  {
    id:"health", emoji:"💊", label:"健康", color:"var(--health)",
    items:[
      {t:"病院で症状を分かりやすく伝える", p:"病院で医師に症状を伝えるのが苦手です。以下の情報から、分かりやすく簡潔に伝えるための説明文を作ってください。\n・症状：○○\n・いつから：○○\n・痛みの程度や特徴：○○\n短い言葉でまとめ、聞かれそうな質問も一緒に予想して教えてください。", pa:"病院で症状を伝える際、医療従事者に伝わりやすいOPQRST(発症様式・増悪/寛解因子・性質・放散・程度・時間経過)の形式で症状を整理してください。\n・症状：○○\n・発症時期・きっかけ：○○\n・症状の変化(改善/悪化する条件)：○○\n・既往歴・服薬中の薬：○○\n上記を医療者向けの簡潔な問診メモの形にまとめ、想定される検査や鑑別診断の候補、診察時に確認すべき質問リストも提案してください。"},
      {t:"健康診断の結果を整理する", p:"健康診断の結果票の内容を整理したいです。以下をふまえて教えてください。\n・気になっている数値：○○\n・基準値：○○(分かれば)\nその数値の一般的な見方と、生活習慣で改善できることを、専門用語を使わず教えてください。", pa:"健康診断の結果について、複数年分の数値推移を踏まえたトレンド分析をしたいです。\n・今年と過去数年分の主要項目の数値(血圧、血糖、脂質、肝機能など)：○○\n・服薬中の薬、既往歴：○○\n各項目の経年変化から読み取れるリスク傾向を分析し、メタボリックシンドロームや生活習慣病の判定基準に照らした評価、追加で受けるべき精密検査の要否を整理してください。"},
      {t:"薬の飲み合わせを整理する", p:"複数の薬を飲んでいて、飲み合わせが心配です。以下をふまえて教えてください。\n・飲んでいる薬：○○\n・気になっていること：○○\nお薬手帳の活用の仕方と、確認すべきポイントを教えてください。", pa:"複数の薬・サプリメントの相互作用について、薬理学的な観点から整理したいです。\n・服用中の薬剤名・用量・服用タイミング：○○\n・併用しているサプリメント・市販薬：○○\n・肝臓・腎臓の機能に関する既往：○○\n薬物相互作用(代謝酵素の競合、吸収阻害など)の可能性がある組み合わせを洗い出し、服用タイミングをずらすべきものや、薬剤師・医師に確認すべき優先順位を整理してください。"},
      {t:"次回診察までに聞くことを整理する", p:"次の診察までに、医師に聞いておきたいことを整理したいです。\n・症状・状況：○○\n・気になっていること：○○\n聞くべきことをリストにして、優先順位もつけてください。", pa:"次回の診察を、治療方針の意思決定の場として最大限活用したいです。\n・現在の診断名・治療方針：○○\n・気になっている選択肢(セカンドオピニオン、治療法の変更など)：○○\n・生活上の制約(仕事、家族の事情など)：○○\n治療方針の選択肢ごとのメリット・デメリット・エビデンスレベルを確認する質問、セカンドオピニオンを検討すべきタイミングの判断基準を含めて、質問リストを優先順位付きで作成してください。"},
      {t:"更年期の症状を整理する", p:"更年期の症状について整理したいです。以下をふまえて教えてください。\n・気になる症状：○○\n・特に困っていること：○○\n日常生活でできるセルフケアの工夫を、無理なく続けられる形で教えてください。", pa:"更年期症状について、ホルモン補充療法(HRT)を含めた治療選択肢を医師と相談する準備をしたいです。\n・症状の種類・頻度・重さ：○○\n・婦人科系の既往歴、乳がん家族歴の有無：○○\n・現在試している対策：○○\nHRTの適応/禁忌となる条件、漢方薬やその他の選択肢との比較検討ポイント、婦人科で確認すべき検査項目を整理してください。"},
      {t:"睡眠の質を改善する", p:"最近よく眠れません。以下をふまえて教えてください。\n・寝つきや睡眠時間の状況：○○\n・生活リズム(仕事の時間帯など)：○○\n睡眠の質を上げるために今日からできる工夫を教えてください。", pa:"睡眠の質を、睡眠衛生(スリープハイジーン)の観点から体系的に見直したいです。\n・平均的な入眠時刻・起床時刻・中途覚醒の回数：○○\n・日中の眠気の程度、カフェイン・アルコール摂取状況：○○\n・寝室環境(光・温度・音)：○○\n睡眠負債の考え方、概日リズムを整える具体的な行動計画(光曝露、運動タイミングなど)を、エビデンスに基づいて優先順位付きで提案してください。"},
      {t:"運動不足を解消する", p:"運動不足を感じています。以下をふまえて教えてください。\n・1日に取れる時間：○○分程度\n・体力に不安な点：○○\n忙しくても続けられる、簡単な運動の工夫を教えてください。", pa:"運動不足解消のため、有酸素運動とレジスタンス運動を組み合わせた週単位のトレーニング計画を立てたいです。\n・現在の運動習慣・体力レベル：○○\n・確保できる時間(曜日・分数)：○○\n・持病や整形外科的な制限：○○\nFITT原則(頻度・強度・時間・種類)に基づいた、無理のない漸進的な計画を、具体的な種目と強度の目安(心拍数や自覚的運動強度)とともに提案してください。"},
      {t:"健康的な食事を整理する", p:"健康を意識した食事にしたいです。以下をふまえて教えてください。\n・普段の食生活で気になっていること：○○\n・料理にかけられる時間：○○\n忙しくても取り入れやすい工夫を教えてください。", pa:"食生活を、PFCバランスと血糖値コントロールの観点から見直したいです。\n・普段の食事内容(1日分の例)：○○\n・気になっている数値(血糖値、中性脂肪など)：○○\n・調理にかけられる時間：○○\nPFCバランスの目安、GI値を意識した食品の選び方、無理なく継続できる置き換えの提案を、具体的な食材レベルで教えてください。"},
      {t:"腰痛・肩こりを和らげる", p:"腰痛・肩こりに悩んでいます。以下をふまえて教えてください。\n・痛む場所：○○\n・悪化するタイミング：○○\n仕事の合間にできるセルフケアの方法を教えてください。", pa:"腰痛・肩こりについて、原因別(姿勢性、筋膜性、椎間板由来など)にセルフケアを整理したいです。\n・痛みの部位・性質(鈍痛/鋭い痛み)・誘発動作：○○\n・デスクワークの環境(椅子、モニター位置など)：○○\n・過去の検査結果(あれば)：○○\n考えられる原因のパターンと、それぞれに適したストレッチ・筋力強化の方法、整形外科受診を検討すべき危険信号(レッドフラグ)を整理してください。"},
      {t:"病院選びを整理する", p:"症状に合った病院や診療科を選びたいです。以下をふまえて教えてください。\n・症状：○○\n・住んでいる地域：○○\n診療科の選び方と、病院選びのチェックポイントを教えてください。", pa:"症状に対して適切な医療機関・専門医を選ぶための判断基準を整理したいです。\n・症状と、これまでの受診歴：○○\n・希望する治療の方向性(手術/保存療法など)：○○\n・住んでいる地域、通院可能な範囲：○○\n症状から想定される診療科・専門外来の選び方、大学病院/専門クリニックそれぞれのメリット・デメリット、紹介状が必要になるケースの判断基準を整理してください。"},
      {t:"介護保険の仕組みを整理する", p:"親の介護保険について整理したいです。以下をふまえて教えてください。\n・親の年齢・状況：○○\n・気になっていること：○○\n申請の大まかな流れと、知っておくべきことを、専門用語を使わず教えてください。", pa:"親の介護保険について、要介護認定の申請から利用開始までの実務フローと、ケアプランの選択肢を整理したいです。\n・親の年齢、現在の身体状況・診断名：○○\n・同居/別居の別、主介護者の状況：○○\n・利用を検討しているサービス(訪問介護、デイサービスなど)：○○\n要介護度ごとに利用できる区分支給限度額の目安、ケアマネジャーとの連携方法、複数のサービスを組み合わせる際の優先順位を整理してください。"},
      {t:"目の疲れ・老眼を整理する", p:"目の疲れ・老眼が気になります。以下をふまえて教えてください。\n・スマホ・パソコンを使う時間：○○時間程度\n・気になる症状：○○\n目の疲れを軽くする工夫と、対策を教えてください。", pa:"目の疲れ・老眼について、眼科的な観点から対策を整理したいです。\n・自覚症状(かすみ、複視、頭痛など)・程度：○○\n・現在使用している眼鏡・コンタクトの度数(分かれば)：○○\n・スマホ・PC作業の時間と距離：○○\n老視の進行度合いの目安、累進屈折力レンズやブルーライトカットの有効性に関するエビデンス、眼科受診を検討すべきタイミング(緑内障などのリスク)を整理してください。"},
      {t:"体重管理を整理する", p:"無理なく体重管理をしたいです。以下をふまえて教えてください。\n・現在気になっていること：○○\n・過去に試したこと：○○\n続けやすい方法を、初心者向けに教えてください。", pa:"体重管理を、基礎代謝と消費カロリーの計算にもとづいて設計したいです。\n・身長・体重・年齢・活動量の目安：○○\n・目標体重、達成したい期間：○○\n・過去のダイエットで失敗した要因：○○\n基礎代謝量(BMR)と総消費カロリー(TDEE)を試算し、無理のないカロリー収支と、リバウンドしにくい減量ペース(週あたりの目安)を提案してください。"},
      {t:"ストレスとの付き合い方を整理する", p:"ストレスを感じることが多いです。以下をふまえて教えてください。\n・ストレスを感じる場面：○○\n・今試していること：○○(あれば)\n気持ちを切り替えるコツと、続けやすいセルフケアを教えてください。", pa:"ストレス対処法を、認知行動療法(CBT)の考え方を取り入れて整理したいです。\n・ストレスを感じる具体的な場面・思考パターン：○○\n・身体面に出ている症状(不眠、動悸など)：○○\n自動思考の癖を客観視するワークの進め方、認知の歪みのパターンと修正方法、セルフケアで対応できる範囲と専門家(心療内科・カウンセリング)に相談すべき目安を整理してください。"},
      {t:"予防接種のスケジュールを整理する", p:"予防接種について整理したいです。以下をふまえて教えてください。\n・年齢：○○歳\n・持病の有無：○○\n50代が気にすべき予防接種の種類とタイミングを教えてください。", pa:"50代以降に推奨される予防接種について、任意接種も含めた優先順位を整理したいです。\n・年齢、持病の有無：○○\n・過去に受けた予防接種の履歴(分かる範囲)：○○\n帯状疱疹、肺炎球菌、インフルエンザなど各ワクチンの推奨年齢・接種間隔・費用助成の有無、持病がある場合の注意点を整理してください。"},
      {t:"歯の健康を整理する", p:"歯や歯茎の健康が気になります。以下をふまえて教えてください。\n・気になっている症状：○○\n・最後に歯科に行った時期：○○\n日常でできるケアと、歯科に相談すべきタイミングを教えてください。", pa:"歯周病のリスク評価と、予防的な歯科ケアの計画を立てたいです。\n・現在の症状(出血、口臭、歯のぐらつきなど)：○○\n・喫煙の有無、糖尿病など全身疾患の有無：○○\n・最後の歯科受診時期：○○\n歯周病と全身疾患(糖尿病、心血管疾患)との関連、進行度に応じたセルフケアと歯科でのメンテナンス頻度の目安を整理してください。"},
      {t:"更年期以降の骨の健康を整理する", p:"骨の健康が気になります。以下をふまえて教えてください。\n・気になっていること：○○\n・普段の運動習慣：○○\n更年期以降に気をつけるべきことを、無理なく続けられる形で教えてください。", pa:"骨粗鬆症の予防について、骨密度検査の結果を踏まえた対策を整理したいです。\n・骨密度検査の結果(YAM値など、分かれば)：○○\n・カルシウム・ビタミンD摂取状況、日光浴の頻度：○○\n・運動習慣：○○\n骨粗鬆症のリスク評価基準、薬物療法が必要となる目安、栄養・運動での予防効果のエビデンスを整理してください。"},
      {t:"健康食品・サプリの選び方を整理する", p:"サプリメントを試したいです。以下をふまえて教えてください。\n・気になっている不調：○○\n・飲んでいる薬(あれば)：○○\n選ぶときのポイントと、薬との飲み合わせで気をつけることを教えてください。", pa:"サプリメントの有効性を、エビデンスレベルの観点から評価したいです。\n・検討しているサプリメントの成分：○○\n・期待している効果：○○\n・服用中の薬：○○\nその成分に関する臨床研究のエビデンスレベル、推奨摂取量と上限量、薬との相互作用リスクを整理し、費用対効果の観点からの優先順位を提案してください。"},
      {t:"むくみ・冷えを整理する", p:"むくみや冷えが気になります。以下をふまえて教えてください。\n・気になる部位：○○\n・生活習慣で気になること：○○\n日常生活でできる対策を教えてください。", pa:"むくみ・冷えの原因を、循環器系・内分泌系の観点から切り分けたいです。\n・むくみ/冷えの部位、時間帯による変化：○○\n・既往歴(心疾患、腎疾患、甲状腺疾患など)：○○\n・服用中の薬(降圧薬など)：○○\n生活習慣由来のものと、疾患が背景にある可能性がある危険信号(レッドフラグ)を整理し、受診を検討すべき基準を明確にしてください。"},
      {t:"健康の不安を書き出して整理する", p:"健康について漠然とした不安があります。\n・今感じていること：○○(自由に書いてください)\n気持ちを整理して、今できる小さな一歩を一緒に考えてください。", pa:"健康に関する漠然とした不安を、リスク評価のフレームワークで整理したいです。\n・感じている不安の内容：○○(自由に書いてください)\n・家族歴、現在の生活習慣：○○\n不安の背景にある要因を「遺伝的リスク」「生活習慣リスク」「未検査のリスク」に分類し、それぞれについて優先して受けるべき検査や対策を整理してください。"}
    ]
  },
  {
    id:"home", emoji:"🧹", label:"家事", color:"var(--home)",
    items:[
      {t:"冷蔵庫の残り物で献立を考える", p:"冷蔵庫に残っている食材で、今日の献立を考えてください。\n・残っている食材：○○(例：卵、キャベツ、豚肉)\n・人数：○○人分\n・希望：○○(例：15分以内で作れる、和食がいい)\n主菜・副菜・汁物のセットで、簡単な作り方も一緒に教えてください。", pa:"冷蔵庫の在庫を無駄なく使い切るため、食材の栄養バランスと使用期限を考慮した献立最適化をしたいです。\n・残っている食材とそれぞれのおおよその消費期限：○○\n・人数：○○人分\n・栄養面で意識したいこと(塩分・カロリーなど)：○○\n消費期限が近いものから優先的に使う献立と、たんぱく質・野菜・炭水化物のバランスを考えた組み合わせを、複数パターン提案してください。"},
      {t:"1週間分の献立と買い物リストを考える", p:"1週間分の献立を考えてください。\n・人数：○○人分\n・希望・避けたい食材：○○\n・予算感：約○○円\n栄養バランスの良い献立と、必要な買い物リストを提案してください。", pa:"1週間分の献立を、栄養バランス(PFC・塩分量)と食材のロス削減を両立させる形で設計したいです。\n・人数：○○人分\n・1日あたりの目標カロリー・塩分量：○○\n・予算：約○○円\n食材の使い回し(同じ食材を複数レシピで消費)を前提に、栄養価を計算した1週間の献立表と、無駄のない買い物リストを作成してください。"},
      {t:"掃除の計画を立てる", p:"掃除を継続する計画を立てたいです。\n・家の広さ・間取り：○○\n・特に苦手な場所：○○\n毎日・週1回・月1回に分けた、無理なく続けられる計画を教えてください。", pa:"掃除を、汚れの種類(油汚れ・水垢・カビなど)と発生サイクルに基づいて体系的に計画したいです。\n・家の広さ・間取り：○○\n・気になる汚れの種類と場所：○○\n・掃除に使える時間(曜日・分数)：○○\n汚れの性質ごとに適した洗剤・道具・頻度を整理し、労力対効果の高い順に優先順位をつけた年間掃除カレンダーを作成してください。"},
      {t:"収納・片付けのアイデアを考える", p:"収納・片付けのアイデアが欲しいです。\n・片付けたい場所：○○\n・物が増えがちなもの：○○\n初心者でも続けられる、シンプルな収納の工夫を教えてください。", pa:"収納を、動線設計(使う場所の近くに収納する)の考え方に基づいて最適化したいです。\n・片付けたい場所の広さ・現状の収納の間取り：○○\n・よく使うもの/滅多に使わないものの傾向：○○\n使用頻度別のゾーニング(ゴールデンゾーン活用)、モノの定位置を決めるルール、リバウンドしにくい仕組み化の方法を提案してください。"},
      {t:"家族の予定・タスクを整理する", p:"家族の予定やタスクを整理したいです。\n・家族構成：○○\n・把握しきれていないこと：○○\n分かりやすく整理する方法と、共有しやすい仕組みを提案してください。", pa:"家族全体のタスク・予定管理を、プロジェクト管理の考え方(タスクの可視化・担当者・締切設定)で仕組み化したいです。\n・家族構成、それぞれのスケジュールの特徴：○○\n・現在困っている抜け漏れの傾向：○○\n共有カレンダーとタスクリストの役割分担、繰り返しタスクのルーティン化、家族間での情報共有ルールを設計してください。"},
      {t:"洗濯の効率を上げる", p:"洗濯の手間を減らしたいです。\n・家族の人数：○○人\n・洗濯の頻度：○○\n・困っていること：○○\n効率よく進める工夫を教えてください。", pa:"洗濯の工程を、時間対効果の観点でボトルネック分析したいです。\n・家族の人数、洗濯物の量と種類：○○\n・洗濯にかかっている時間の内訳(洗う・干す・畳む・しまう)：○○\n各工程の時間短縮策(洗剤の選定、干し方、収納の仕組み化)を整理し、最も効果の大きい改善ポイントから優先順位をつけて提案してください。"},
      {t:"作り置きのメニューを考える", p:"週末にまとめて作り置きをしたいです。\n・人数：○○人分\n・好み・避けたい食材：○○\n平日に助かる作り置きメニューを3つ、日持ちさせるコツと一緒に教えてください。", pa:"作り置きを、食中毒リスク管理と栄養バランスの両面から設計したいです。\n・人数：○○人分\n・冷蔵/冷凍それぞれで保存したい期間：○○\n・好み・避けたい食材：○○\n食材ごとの安全な保存期間の目安、傷みやすい食材を避けた作り置き向きのメニュー選定、1週間分の栄養バランスを考慮した組み合わせを提案してください。"},
      {t:"食材を無駄なく使い切る", p:"食材を余らせてしまうことが多いです。\n・よく余らせる食材：○○\n・買い物の頻度：○○\n無駄なく使い切るための工夫を教えてください。", pa:"食品ロスを削減するため、家庭内の食材在庫管理の仕組みを設計したいです。\n・よく余らせる食材とその理由：○○\n・買い物の頻度・まとめ買いの傾向：○○\n先入れ先出し(FIFO)の考え方を取り入れた在庫管理の方法、購入量の適正化、余りやすい食材の保存・活用レシピを体系的に整理してください。"},
      {t:"キッチンの掃除・手入れを整理する", p:"キッチンの掃除方法を整理したいです。\n・気になっている汚れ：○○\n・掃除にかけられる時間：○○\n効率よくきれいにする方法と、汚れをためない習慣を教えてください。", pa:"キッチンの汚れを、油汚れの化学的性質(酸性/アルカリ性)に基づいて効率よく落とす方法を整理したいです。\n・気になっている汚れの種類と場所：○○\n・使用している換気扇・コンロの種類：○○\n汚れの性質に合った洗剤の選び方(pHの観点)、こびりつきを防ぐ日常メンテナンスの頻度、頑固な汚れへの対処法を整理してください。"},
      {t:"衣替え・季節の片付けを整理する", p:"衣替えや季節の片付けをスムーズに進めたいです。\n・収納スペースの広さ：○○\n・困っていること：○○\n手間を減らす進め方と、処分するかどうかの判断基準を教えてください。", pa:"衣類の管理を、使用頻度分析と保管環境(湿度・虫害対策)の観点から最適化したいです。\n・収納スペースの広さ・除湿環境：○○\n・過去1年で袖を通さなかった衣類の傾向：○○\n適切な保管方法(素材別の除湿剤・防虫剤の使い分け)、要不要の判断基準(1年ルールなど)、衣替えの負担を減らす収納動線を提案してください。"},
      {t:"来客時のおもてなし準備を考える", p:"来客があるときの準備をスムーズに進めたいです。\n・来客の人数・関係性：○○\n・来客までの時間：○○\n段取りよく進めるための準備リストを作ってください。", pa:"来客対応を、時間軸での段取り(タイムライン管理)として設計したいです。\n・来客の人数・関係性・滞在時間：○○\n・来客までの準備可能時間：○○\n・アレルギーや好みなど配慮事項：○○\n準備開始から来客までの逆算スケジュール、当日の動線を考えた作業の順序、緊急時のリカバリープランを含めて整理してください。"},
      {t:"お弁当のメニューを考える", p:"お弁当のメニューを考えたいです。\n・人数：○○人分\n・好み・避けたい食材：○○\n手早く作れて栄養バランスの良いメニューを3つ提案してください。", pa:"お弁当を、彩り・栄養バランス・傷みにくさの3軸で最適化したいです。\n・人数：○○人分\n・調理時間の制約、常温保存時間の目安：○○\n食中毒予防の観点(水分管理、加熱の徹底)を踏まえたメニュー選定と、栄養バランス・彩りを両立する組み合わせのルールを提案してください。"},
      {t:"掃除道具・洗剤を整理する", p:"掃除道具や洗剤を整理したいです。\n・今持っている道具・洗剤：○○\n・困っていること：○○\n場所別に必要な道具・洗剤と、整理・収納のコツを教えてください。", pa:"掃除道具・洗剤を、成分の相性(混ぜてはいけない組み合わせ含む)と用途別の効果で整理したいです。\n・今持っている道具・洗剤の一覧：○○\n・重複や使いこなせていないものの傾向：○○\n酸性/アルカリ性/中性洗剤の使い分け、絶対に混ぜてはいけない組み合わせの注意喚起、用途別に本当に必要な最小限のラインナップを提案してください。"},
      {t:"ゴミの分別・処分方法を整理する", p:"ゴミの分別・処分方法を整理したいです。\n・迷っている品目：○○\n・住んでいる地域：○○\n分別の考え方と、粗大ゴミ・不用品の処分方法を教えてください。", pa:"ゴミの分別・処分について、地域のルールと環境負荷の観点を踏まえて整理したいです。\n・迷っている品目：○○\n・住んでいる自治体：○○\n一般的な分別の考え方に加え、粗大ゴミ・小型家電・危険物などの特殊な処分ルート、リサイクル可能な品目の見分け方を整理してください。"},
      {t:"家計簿・レシート管理を整理する", p:"レシートや家計簿の管理を続けたいです。\n・今までの管理方法：○○\n・続かない理由：○○\n無理なく続けられる管理方法を教えてください。", pa:"家計簿を、費目別の分析ができる形で仕組み化したいです。\n・今までの管理方法と続かなかった理由：○○\n・把握したい費目の粒度：○○\n固定費/変動費/特別費の分類ルール、レシートのデータ化から分析までのワークフロー、月次で振り返るべき指標を設計してください。"},
      {t:"庭・ベランダの手入れを考える", p:"庭やベランダの植物の手入れを整理したいです。\n・育てている植物：○○\n・かけられる時間：○○\n無理なく続けられるお手入れの工夫を教えてください。", pa:"植物の手入れを、季節ごとの生育サイクルに合わせて計画したいです。\n・育てている植物の種類：○○\n・日当たり・かけられる時間：○○\n植物ごとの水やり・肥料・剪定の年間スケジュール、病害虫対策のタイミング、手間を減らすための植物選びの考え方を整理してください。"},
      {t:"季節の行事の準備を整理する", p:"季節の行事の準備を早めに進めたいです。\n・行事：○○(例：お正月、お盆)\n・毎年困っていること：○○\n早めに準備を進めるためのリストを作ってください。", pa:"季節の行事の準備を、逆算スケジュールとタスク管理で仕組み化したいです。\n・行事：○○\n・毎年発生する準備タスクと、困っていること：○○\n行事本番から逆算した準備開始時期、毎年使い回せるチェックリストの作り方、家族で分担する場合の役割分担を整理してください。"},
      {t:"日用品のストック管理を整理する", p:"日用品のストック管理をしたいです。\n・買い忘れ・買いすぎが多いもの：○○\n・収納スペース：○○\nストックを管理する簡単な仕組みを教えてください。", pa:"日用品の在庫管理を、消費ペースの記録に基づいた発注点管理の考え方で仕組み化したいです。\n・買い忘れ・買いすぎが多いもの：○○\n・収納スペース：○○\n各アイテムの消費ペースを把握する方法、在庫が一定量を下回ったら補充するタイミング(発注点)の決め方、収納スペースに応じた適正在庫量の考え方を整理してください。"},
      {t:"家事の分担を考える", p:"家族との家事分担を見直したいです。\n・家族構成：○○\n・今の分担で不満なこと：○○\n無理なく続けられる分担の決め方と、話し合うときのコツを教えてください。", pa:"家事分担を、時間コストと心理的負担(名もなき家事含む)を可視化した上で設計したいです。\n・家族構成、それぞれの生活パターン：○○\n・今の分担で不満に感じている点：○○\n家事を工程レベルまで分解して時間コストを見積もる方法、「名もなき家事」を含めた公平な分担の考え方、話し合いの進め方のフレームワークを提案してください。"},
      {t:"来客用の部屋の整え方を考える", p:"来客の前に部屋を手早く整えたいです。\n・部屋の状況：○○\n・来客までの時間：○○\n効率よく片付けるコツを教えてください。", pa:"来客前の部屋の片付けを、時間対効果の高い順に整理したいです。\n・部屋の広さ、現状の散らかり方：○○\n・来客までの時間：○○\n来客の視線が集まりやすい場所を優先する考え方、短時間で見た目の印象を大きく改善できるポイントの優先順位を整理してください。"}
    ]
  },
  {
    id:"ai", emoji:"🖥️", label:"AI活用", color:"var(--ai)",
    items:[
      {t:"Instagram投稿文を作る", p:"Instagramの投稿文を作りたいです。\n・テーマ：○○\n・伝えたいこと：○○\n共感されやすく、行動につながる投稿文を考えてください。", pa:"Instagram投稿文を、エンゲージメント最適化の観点で設計したいです。\n・テーマ：○○\n・ターゲット層、アカウントの現在のフォロワー傾向：○○\n・投稿の目的(保存数増加/コメント誘発/プロフィール遷移など)：○○\n冒頭2行でのフック設計、アルゴリズム上有利とされる要素(滞在時間・保存率を高める構成)、CTA(行動喚起)の配置を踏まえた投稿文を作成してください。"},
      {t:"リールの台本を作る", p:"Instagramリール動画の台本を作りたいです。\n・テーマ：○○\n・尺の目安：15秒〜30秒\n話し言葉で親しみやすい台本を、冒頭で興味を引く一言から作ってください。", pa:"Instagramリールの台本を、視聴維持率を最大化する構成で作りたいです。\n・テーマ：○○\n・尺の目安：15秒〜30秒\n・過去の投稿で反応が良かった/悪かった傾向：○○\n冒頭0.5秒〜3秒のフック設計、離脱ポイントを作らないテンポ配分、ループ再生を狙った構成、字幕・テロップの入れ方を含めた台本を作成してください。"},
      {t:"ChatGPTの基本的な使い方を整理する", p:"ChatGPT(またはAIチャット)を初めて使います。\n・使ってみたいこと：○○\n基本的な使い方と、活用例を初心者向けに教えてください。", pa:"ChatGPT(またはAIチャット)を、プロンプトエンジニアリングの観点から効果的に使いこなしたいです。\n・活用したい業務・用途：○○\n・現在の利用状況、困っていること：○○\n役割設定(ロールプロンプト)、出力形式の指定、具体例を示すfew-shotの手法など、回答精度を上げるプロンプト設計のテクニックと、用途別の具体的な活用例を整理してください。"},
      {t:"Canvaでチラシ・画像を作る", p:"Canvaで簡単なチラシや画像を作りたいです。\n・作りたいもの：○○\n・使う場面：○○\n初心者向けの手順を教えてください。", pa:"Canvaを使ったデザインを、デザイン原則(近接・整列・強弱・反復)に基づいて改善したいです。\n・作りたいもの、現在のたたき台の状況：○○\n・伝えたい印象、ターゲット：○○\n配色理論(トーン&マナーの統一)、視線誘導を意識したレイアウト、テンプレートを活用しつつオリジナリティを出す方法を整理してください。"},
      {t:"画像生成AIの使い方を整理する", p:"画像生成AIを使ってみたいです。\n・作りたい画像のイメージ：○○\n基本的な使い方と、イメージ通りの画像を作るコツを教えてください。", pa:"画像生成AIで意図通りの画像を作るため、プロンプト設計の精度を上げたいです。\n・作りたい画像のイメージ・用途：○○\n・使用しているツール：○○\n・うまく再現できていない要素：○○\n構図・画角・光源・アートスタイルなどを指定する具体的なプロンプトの書き方、意図しない結果になる原因の切り分け方、参照画像を活用する方法を整理してください。"},
      {t:"noteの記事構成を作る", p:"noteの記事を書きたいです。\n・テーマ：○○\n・伝えたいこと：○○\n読みやすい記事の構成案と、タイトル案を3つ作ってください。", pa:"note記事を、読了率と有料部分への転換率を意識した構成で設計したいです。\n・テーマ、想定読者：○○\n・伝えたいこと、記事の着地点(販売・集客など)：○○\n冒頭での読者の課題提示、無料部分で信頼を積み上げる構成、有料部分に進みたくなる引きの作り方を含めた記事構成案を作成してください。"},
      {t:"AIに写真の説明文を作ってもらう", p:"この写真の内容を説明する文章を作ってください。(写真を添付して使ってください)\n・使う場面：○○(例：SNS投稿、商品説明)\n短いバージョンと長いバージョンの両方を作ってください。", pa:"商品・作品写真の説明文を、SEOとコンバージョンの両面から最適化したいです。(写真を添付して使ってください)\n・使う場面(ECサイト、SNSなど)：○○\n・検索されたいキーワード：○○\n検索されやすいキーワードを自然に含めた説明文と、購買・保存につながるベネフィット訴求を組み合わせた文章を、複数パターン作成してください。"},
      {t:"AIに商品説明文を作ってもらう", p:"ハンドメイド作品の商品説明文を作りたいです。\n・作品の特徴：○○\n・サイズ・素材：○○\n魅力が伝わる説明文を作ってください。", pa:"ハンドメイド作品の商品説明文を、購買心理(ベネフィット訴求・希少性・社会的証明)を踏まえて設計したいです。\n・作品の特徴、素材、制作にかけた工程：○○\n・価格帯、ターゲット顧客：○○\n機能面の説明にとどまらず、使用シーンの想起・購入後の変化を訴求する構成で、複数パターンの説明文を作成してください。"},
      {t:"AIで音声入力・文字起こしをする", p:"話した内容を文字にしたいです。\n・使いたい場面：○○\n音声入力・文字起こしの基本的な使い方を、初心者向けに教えてください。", pa:"音声入力・文字起こしを、業務効率化のワークフローとして組み込みたいです。\n・使いたい場面(議事録、原稿作成など)：○○\n・現在使っているツール、精度面の課題：○○\n認識精度を上げるための話し方・環境設定、文字起こし後の整形(要約・話者分離)を自動化する方法を整理してください。"},
      {t:"AIで動画編集の基本を整理する", p:"スマホで簡単な動画編集をしたいです。\n・作りたい動画：○○\n初心者向けの動画編集の基本と、おすすめアプリを教えてください。", pa:"スマホでの動画編集を、視聴維持率を意識した編集技法の観点で整理したいです。\n・作りたい動画の種類・尺：○○\n・使用しているアプリ：○○\nカット割りのテンポ、テロップ・BGMの入れ方、離脱を防ぐための冒頭数秒の作り込みなど、視聴維持率を高める編集の考え方を整理してください。"},
      {t:"AIツールの選び方を整理する", p:"自分に合ったAIツールを選びたいです。\n・やりたいこと：○○\n・パソコン・スマホどちらで使うか：○○\n目的別のおすすめの選び方を教えてください。", pa:"業務・活動に合わせたAIツールの選定を、コストパフォーマンスと機能要件のマトリクスで整理したいです。\n・やりたいこと、現在の業務フロー：○○\n・予算感、既に使っているツール：○○\n候補となるツールを機能・料金・学習コストの軸で比較し、既存ツールとの連携や、将来的な拡張性も踏まえた選定基準を整理してください。"},
      {t:"AIに相談しながらアイデア出しをする", p:"新しい企画やアイデアを考えたいです。\n・テーマ：○○\n・目的：○○\nアイデアを5つ提案し、それぞれのメリット・デメリットも教えてください。", pa:"新しい企画のアイデア出しを、発散思考と収束思考を組み合わせたフレームワークで進めたいです。\n・テーマ、目的：○○\n・制約条件(予算、期間、リソースなど)：○○\nブレインストーミングで数多くのアイデアを発散させた後、実現可能性とインパクトの2軸で評価・絞り込みを行うプロセスを踏まえて、アイデア出しを進めてください。"},
      {t:"AIでハッシュタグを考える", p:"Instagram投稿に付けるハッシュタグを考えてください。\n・テーマ：○○\n・ターゲット：○○\n関連性の高いハッシュタグを10個程度、大小のバランスも考えて提案してください。", pa:"ハッシュタグ戦略を、検索ボリュームと競合性のバランスで設計したいです。\n・テーマ、ターゲット層：○○\n・アカウントの現在のフォロワー数・フェーズ：○○\nビッグワード/ミドルワード/スモールワードの比率設計、競合アカウントの傾向分析の観点、発見タブに載りやすくするための組み合わせ方を整理してください。"},
      {t:"AIでプロフィール文を作る", p:"SNSのプロフィール文を作りたいです。\n・自分の特徴・活動内容：○○\n・伝えたい印象：○○\n魅力が伝わるプロフィール文を3パターン作ってください。", pa:"SNSプロフィール文を、ポジショニング戦略(差別化要素の明確化)の観点で設計したいです。\n・自分の特徴・活動内容、競合となるアカウント：○○\n・ターゲットに与えたい印象、フォローする理由になる価値提案：○○\nターゲットが一目で「フォローする理由」を理解できる構成、検索されるキーワードの含め方を踏まえたプロフィール文を複数パターン作成してください。"},
      {t:"AIで文章の言い換え・添削をする", p:"以下の文章を、より分かりやすく自然な表現に直してください。\n・直したい文章：○○\n・希望のトーン：○○(例：親しみやすく、丁寧に)\n分かりやすく教えてください。", pa:"文章を、目的別のライティング理論(PREP法、起承転結など)に基づいて添削してほしいです。\n・直したい文章：○○\n・用途(説得、説明、共感など)、希望のトーン：○○\n論理構成の一貫性、冗長表現の削減、読み手の行動を促す文章構造の観点から添削し、修正理由も併せて説明してください。"},
      {t:"AIでリサーチ・情報収集をする", p:"以下のテーマについて調べたいです。\n・テーマ：○○\n・知りたいポイント：○○\n分かりやすくまとめて教えてください。", pa:"特定テーマについて、一次情報と二次情報を区別しながら体系的にリサーチしたいです。\n・テーマ、知りたいポイント：○○\n・情報の使用目的(意思決定、コンテンツ作成など)：○○\n情報源の信頼性の見極め方、異なる立場の情報を比較する視点、リサーチ結果を構造化して整理する方法を教えてください。"},
      {t:"AIでイベント告知文を作る", p:"イベントの告知文を作ってください。\n・イベント内容：○○\n・日時・場所：○○\n魅力が伝わる告知文を作ってください。", pa:"イベント告知文を、参加障壁を下げるマーケティング視点で設計したいです。\n・イベント内容、日時・場所：○○\n・想定される参加者の懸念点(参加ハードル)：○○\nベネフィット訴求、参加者の不安を解消するFAQ的要素、緊急性を演出する要素(限定性・締切)を組み込んだ告知文を作成してください。"},
      {t:"AIで自己紹介動画の台本を作る", p:"自己紹介動画の台本を作りたいです。\n・自分の活動内容：○○\n・動画の長さ：○○\n親しみやすい自己紹介の台本を作ってください。", pa:"自己紹介動画の台本を、視聴者の記憶に残るストーリーテリング(起承転結)の構成で作りたいです。\n・自分の活動内容、伝えたい強み：○○\n・動画の長さ、公開する場面：○○\n共感を生む導入、独自性を印象付ける中盤、行動を促す締めくくりという構成で、視聴維持を意識した台本を作成してください。"},
      {t:"AIでよくある質問への回答文を作る", p:"お客様からよくある質問への回答文を作りたいです。\n・質問内容：○○\n・希望のトーン：○○\n丁寧で分かりやすい回答文を作ってください。", pa:"FAQ回答文を、顧客の不安を先回りして解消するカスタマーサポートの観点で設計したいです。\n・想定される質問内容：○○\n・過去に多かったクレームや誤解の傾向：○○\n質問の裏にある本当の懸念(潜在ニーズ)を汲み取った回答、次のアクションを明確にする文末表現を含めた回答文を作成してください。"},
      {t:"AIで年間の発信ネタを考える", p:"SNS発信のネタが尽きてしまいました。\n・発信しているジャンル：○○\n・投稿頻度：○○\n1ヶ月分の投稿ネタのアイデアを、カレンダー形式で提案してください。", pa:"年間の発信計画を、季節性・トレンド・エバーグリーンコンテンツの比率設計で立てたいです。\n・発信しているジャンル、投稿頻度：○○\n・過去に反応が良かった投稿の傾向：○○\n季節イベントに絡めたネタ、繰り返し需要のあるエバーグリーンネタ、トレンドに乗るネタの比率を設計し、1年分のコンテンツカレンダーの骨子を提案してください。"}
    ]
  },
  {

let state = {screen:"home", cat:null, idx:0, prevScreen:"home"};
let profile = {age:"", job:"", sidejob:"", memo:""};
let profileLoaded = false;
let level = "beginner";

function loadLevel(){
  try{
    const v = localStorage.getItem("ai_seikatsu_jiten_level");
    if(v === "advanced") level = "advanced";
  }catch(e){ /* no preference saved yet, or storage blocked */ }
}

function setLevel(l){
  level = l;
  try{ localStorage.setItem("ai_seikatsu_jiten_level", level); }catch(e){ /* ignore storage failure */ }
  render();
}

async function loadProfile(){
  try{
    const raw = localStorage.getItem("ai_seikatsu_jiten_profile");
    if(raw){
      const v = JSON.parse(raw);
      profile = Object.assign(profile, v);
    }
  }catch(e){ /* no profile saved yet, or storage blocked */ }
  profileLoaded = true;
  render();
}

async function saveProfile(newProfile){
  profile = newProfile;
  try{
    localStorage.setItem("ai_seikatsu_jiten_profile", JSON.stringify(profile));
  }catch(e){ /* ignore storage failure, still usable this session */ }
}

function hasProfile(){
  return !!(profile.age || profile.job || profile.sidejob || profile.memo);
}

function buildProfileIntro(){
  const parts = [];
  if(profile.age || profile.job){
    let line = "私は";
    if(profile.age) line += profile.age;
    if(profile.job) line += (profile.age?"、":"") + profile.job + "をしています。";
    else line += "です。";
    parts.push(line);
  }
  if(profile.sidejob) parts.push("副業・活動として" + profile.sidejob + "もしています。");
  if(profile.memo) parts.push(profile.memo);
  return parts.join("");
}

function render(){
  const app = document.getElementById("app");
  if(!profileLoaded){ app.innerHTML = ""; return; }
  if(state.screen==="home") app.innerHTML = renderHome();
  else if(state.screen==="list") app.innerHTML = renderList();
  else if(state.screen==="detail") app.innerHTML = renderDetail();
  else app.innerHTML = renderProfileScreen();
}

function profilePill(){
  const label = hasProfile() ? "👤 マイ情報" : "👤 マイ情報を登録";
  return `<div class="topbar-profile" onclick="goProfile()">${label}</div>`;
}

function renderHome(){
  const tabs = DATA.map(c=>`
    <div class="tab-card" onclick="goList('${c.id}')">
      <div class="tab-flag" style="background:${c.color}"></div>
      <div class="tab-emoji">${c.emoji}</div>
      <div class="tab-body">
        <div class="tab-title">${c.label}</div>
        <div class="tab-count">${c.items.length}個のプロンプト</div>
      </div>
      <div class="tab-arrow">›</div>
    </div>`).join("");

  const banner = hasProfile()
    ? `<div class="profile-banner" onclick="goProfile()">👤 <span><b>${escapeHtml(profile.age||"")} ${escapeHtml(profile.job||"")}</b> の情報でプロンプトを自動作成します</span><span class="go">›</span></div>`
    : `<div class="profile-banner" onclick="goProfile()">👤 <span>あなたの情報を登録すると、プロンプトに<b>自動で書き込まれます</b></span><span class="go">›</span></div>`;

  return `
    <div class="topbar">
      <button class="backbtn">‹</button>
      <div class="topbar-title">AI生活辞典</div>
      ${profilePill()}
    </div>
    <div class="home-hero">
      <div class="icon">📚</div>
      <h1>AI生活辞典</h1>
      <p>困ったことを選んで、プロンプトをきりとって使うだけ。<br>今日からつかえるAI活用辞典です。</p>
    </div>
    ${banner}
    <div class="tabs">${tabs}</div>
    <div class="home-footnote">プロンプト中の「○○」の部分は、その時の状況に合わせて書きかえて使ってください</div>
  `;
}

function renderList(){
  const cat = DATA.find(c=>c.id===state.cat);
  const rows = cat.items.map((it,i)=>`
    <div class="item-row" onclick="goDetail(${i})">
      <div class="item-num">${toCircled(i+1)}</div>
      <div class="item-label">${it.t}</div>
      <div class="item-go">›</div>
    </div>`).join("");
  return `
    <div class="topbar">
      <button class="backbtn show" onclick="goHome()">‹</button>
      <div class="topbar-title">${cat.label}</div>
      ${profilePill()}
    </div>
    <div class="list-hero"><div class="emoji">${cat.emoji}</div><h2>${cat.label}</h2></div>
    <div class="list-hint">使いたいプロンプトをタップすると、全文とコピーボタンが見られます</div>
    <div class="item-list">${rows}</div>
  `;
}

function renderDetail(){
  const cat = DATA.find(c=>c.id===state.cat);
  const it = cat.items[state.idx];
  const hasPrev = state.idx>0, hasNext = state.idx<cat.items.length-1;
  const hasAdvanced = !!it.pa;
  const useAdvanced = hasAdvanced && level==="advanced";
  const promptText = useAdvanced ? it.pa : it.p;
  const intro = buildProfileIntro();
  const bodyHtml = intro
    ? `<span class="profile-part">${escapeHtml(intro)}</span>\n\n${escapeHtml(promptText)}`
    : escapeHtml(promptText);
  const missingNote = hasProfile()
    ? ""
    : `<div class="profile-missing" onclick="goProfile()">👤 マイ情報を登録すると、この文章の前にあなたの状況が自動で入ります<span class="go">›</span></div>`;
  const levelSwitch = hasAdvanced
    ? `<div class="level-switch">
        <button class="level-btn ${useAdvanced?"":"active"}" onclick="setLevel('beginner')">初心者</button>
        <button class="level-btn ${useAdvanced?"active":""}" onclick="setLevel('advanced')">上級者</button>
      </div>`
    : "";

  return `
    <div class="topbar">
      <button class="backbtn show" onclick="goList('${cat.id}')">‹</button>
      <div class="topbar-title">${cat.label}</div>
      ${profilePill()}
    </div>
    <div class="detail-wrap">
      <div class="pattern-card" style="--card-color:${cat.color}">
        <span class="pattern-tag">${cat.label} ${toCircled(state.idx+1)}</span>
        <div class="pattern-title">${it.t}</div>
        ${levelSwitch}
        <div class="pattern-body" id="promptText">${bodyHtml}</div>
        <div class="pattern-note">「○○」の部分はご自身の状況に書きかえてから、AIチャットに貼りつけてください</div>
        ${missingNote}
        <button class="copy-btn" style="--card-color:${cat.color}" onclick="copyPrompt()">✂️ きりとって使う（コピー）</button>
      </div>
    </div>
    <div class="prev-next">
      <button class="nav-btn" ${hasPrev?"":"disabled"} onclick="shift(-1)">‹ 前の項目</button>
      <button class="nav-btn" ${hasNext?"":"disabled"} onclick="shift(1)">次の項目 ›</button>
    </div>
  `;
}

function renderProfileScreen(){
  return `
    <div class="topbar">
      <button class="backbtn show" onclick="goBackFromProfile()">‹</button>
      <div class="topbar-title">マイ情報</div>
    </div>
    <div class="profile-wrap">
      <div class="profile-intro">ここに登録した情報は、プロンプトの前に自動で差し込まれます。空欄のままでもOKです。</div>
      <div class="field">
        <label>年代</label>
        <input id="f-age" type="text" placeholder="例：50代" value="${escapeAttr(profile.age)}">
      </div>
      <div class="field">
        <label>本業・お仕事</label>
        <input id="f-job" type="text" placeholder="例：パン屋のパート勤務" value="${escapeAttr(profile.job)}">
      </div>
      <div class="field">
        <label>副業・活動していること</label>
        <input id="f-sidejob" type="text" placeholder="例：ライブバー運営、洋服リメイク" value="${escapeAttr(profile.sidejob)}">
      </div>
      <div class="field">
        <label>その他、伝えておきたいこと(自由記入)</label>
        <textarea id="f-memo" placeholder="例：パソコンや数字の管理が苦手です">${escapeHtml(profile.memo)}</textarea>
      </div>
      <button class="save-btn" onclick="onSaveProfile()">保存する</button>
    </div>
  `;
}

function toCircled(n){
  const circ = "①②③④⑤⑥⑦⑧⑨⑩";
  return circ[n-1] || (n+"");
}
function escapeHtml(s){
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escapeAttr(s){
  return escapeHtml(s).replace(/"/g,"&quot;");
}

function goHome(){ state = {screen:"home", cat:null, idx:0}; render(); window.scrollTo(0,0); }
function goList(id){ state = {screen:"list", cat:id, idx:0}; render(); window.scrollTo(0,0); }
function goDetail(i){ state.screen="detail"; state.idx=i; render(); window.scrollTo(0,0); }
function shift(d){ state.idx += d; render(); window.scrollTo(0,0); }
function goProfile(){
  state.prevScreen = state.screen;
  state.screen = "profile";
  render();
  window.scrollTo(0,0);
}
function goBackFromProfile(){
  state.screen = state.prevScreen || "home";
  render();
  window.scrollTo(0,0);
}
async function onSaveProfile(){
  const newProfile = {
    age: document.getElementById("f-age").value.trim(),
    job: document.getElementById("f-job").value.trim(),
    sidejob: document.getElementById("f-sidejob").value.trim(),
    memo: document.getElementById("f-memo").value.trim()
  };
  await saveProfile(newProfile);
  const t = document.getElementById("toast");
  t.textContent = "保存しました";
  t.classList.add("show");
  setTimeout(()=>{ t.classList.remove("show"); t.textContent="コピーしました"; }, 1400);
  goBackFromProfile();
}

function copyPrompt(){
  const cat = DATA.find(c=>c.id===state.cat);
  const it = cat.items[state.idx];
  const useAdvanced = !!it.pa && level==="advanced";
  const promptText = useAdvanced ? it.pa : it.p;
  const intro = buildProfileIntro();
  const text = intro ? (intro + "\n\n" + promptText) : promptText;
  const finish = ()=>{
    const t = document.getElementById("toast");
    t.textContent = "コピーしました";
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"), 1600);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(finish).catch(()=>{fallbackCopy(text); finish();});
  } else {
    fallbackCopy(text); finish();
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}

loadLevel();
loadProfile();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
